<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Em Manutenção</title>
  <style>
    :root{
      --bg-deep:#0a2f67;
      --bg-mid:#12478f;
      --bg-fire:#8c4320;
      --bg-hot:#d9852f;
      --bg-flash:#f6d8a6;
      --text-main:#eef7ff;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Inter,Arial,Helvetica,sans-serif;
      background:var(--bg-deep);
    }

    body{
      transition:background-color .35s linear;
    }

    .page{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(34,124,255,.16), transparent 34%),
        radial-gradient(circle at 50% 68%, rgba(11,49,115,.35), transparent 42%);
    }

    .backdrop{
      position:absolute;
      inset:0;
      z-index:0;
      transform:scale(1.08);
      background:
        radial-gradient(circle at 50% 40%, rgba(36,144,255,.22), transparent 28%),
        radial-gradient(circle at 50% 72%, rgba(10,47,103,.96), rgba(10,47,103,1) 62%);
      transition:background .4s linear, filter .35s linear, opacity .35s linear;
    }

    .page.is-fire .backdrop{
      background:
        radial-gradient(circle at 56% 43%, rgba(255,184,66,.55), transparent 22%),
        radial-gradient(circle at 56% 47%, rgba(255,98,0,.24), transparent 38%),
        radial-gradient(circle at 50% 74%, rgba(84,28,12,.95), rgba(84,28,12,1) 70%);
      filter:saturate(1.2);
    }

    .page.is-flash .backdrop{
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,.92), transparent 30%),
        radial-gradient(circle at 50% 52%, rgba(255,208,128,.55), transparent 46%),
        linear-gradient(180deg, #f6d8a6, #e8c18a);
      filter:brightness(1.15);
    }

    .video-wrap{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:transparent;
    }

    video{
      width:100vw;
      height:100vh;
      object-fit:cover;
      object-position:center center;
      display:block;
      transform:scale(1.045);
      filter:saturate(1.05) contrast(1.03);
      background:transparent;
    }

    .blend{
      position:absolute;
      inset:-3%;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at center, transparent 48%, rgba(10,47,103,.16) 76%, rgba(10,47,103,.35) 100%);
      transition:background .35s linear;
    }

    .page.is-fire .blend{
      background:
        radial-gradient(circle at center, transparent 46%, rgba(140,67,32,.14) 76%, rgba(74,20,8,.30) 100%);
    }

    .page.is-flash .blend{
      background:
        radial-gradient(circle at center, rgba(255,255,255,.03) 32%, rgba(246,216,166,.18) 70%, rgba(232,193,138,.34) 100%);
    }

    .heat{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
      opacity:0;
      transform:scale(1);
      transition:opacity .25s linear, transform .3s linear;
      mix-blend-mode:screen;
      background:
        radial-gradient(circle at 56% 46%, rgba(255,196,86,.36), transparent 18%),
        radial-gradient(circle at 58% 48%, rgba(255,108,24,.22), transparent 34%),
        radial-gradient(circle at 52% 62%, rgba(255,80,0,.18), transparent 44%);
    }

    .page.is-fire .heat{
      opacity:1;
      transform:scale(1.03);
    }

    .flash{
      position:absolute;
      inset:0;
      z-index:6;
      pointer-events:none;
      opacity:0;
      transition:opacity .4s ease;
      background:radial-gradient(circle, #ffffff 0%, #fff7e8 40%, #ffd9b3 100%);
    }

    .page.is-flash .flash{
      opacity:1;
    }

    .title-wrap{
      position:absolute;
      inset:0;
      z-index:10;
      display:grid;
      place-items:center;
      pointer-events:none;
    }

    .title-box{
      position:absolute;
      width:min(78vw,780px);
      height:min(18vw,160px);
      border-radius:999px;
      opacity:0;
      background:radial-gradient(circle, rgba(255,255,255,.20), rgba(255,170,68,.12), transparent 72%);
      filter:blur(8px);
      transition:opacity .38s ease;
    }

    .title{
      position:relative;
      padding:18px 28px;
      font-size:clamp(30px,6vw,88px);
      font-weight:900;
      letter-spacing:clamp(2px,.7vw,10px);
      text-transform:uppercase;
      color:var(--text-main);
      opacity:0;
      transform:translateY(26px) scale(.96);
      transition:opacity .42s ease, transform .42s ease;
      text-align:center;
      line-height:.95;
      text-shadow:
        0 0 10px rgba(255,255,255,.95),
        0 0 24px rgba(67,169,255,.42),
        0 0 48px rgba(255,165,73,.32);
    }

    .title::before,
    .title::after{
      content:attr(data-text);
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
    }

    .title::before{
      color:rgba(86,196,255,.8);
      transform:translate(-2px,0);
      filter:blur(.5px);
    }

    .title::after{
      color:rgba(255,155,76,.8);
      transform:translate(2px,0);
      filter:blur(.5px);
    }

    .page.show-title .title{
      opacity:1;
      transform:translateY(0) scale(1);
      animation:titlePulse 1.2s ease-in-out infinite alternate;
    }

    .page.show-title .title::before,
    .page.show-title .title::after{
      opacity:1;
      animation:glitch 1.1s steps(1) infinite;
    }

    .page.show-title .title-box{
      opacity:1;
    }

    .grain{
      position:absolute;
      inset:0;
      z-index:9;
      pointer-events:none;
      opacity:.06;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,.08) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 4px);
      mix-blend-mode:overlay;
    }

    @keyframes titlePulse{
      from{transform:translateY(0) scale(1)}
      to{transform:translateY(-2px) scale(1.018)}
    }

    @keyframes glitch{
      0%,100%{clip-path:inset(0 0 0 0)}
      20%{clip-path:inset(0 0 72% 0)}
      40%{clip-path:inset(42% 0 34% 0)}
      60%{clip-path:inset(76% 0 0 0)}
      80%{clip-path:inset(16% 0 56% 0)}
    }

    @media (max-width:820px){
      video{transform:scale(1.09)}
      .title{
        width:90vw;
        font-size:clamp(28px,10vw,56px);
        line-height:.94;
      }
      .title-box{
        width:90vw;
        height:34vw;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="backdrop"></div>

    <div class="video-wrap">
      <video id="heroVideo" autoplay muted playsinline preload="auto">
        <source src="./image/video4.mp4" type="video/mp4" />
        Seu navegador não suporta vídeo HTML5.
      </video>
      <div class="blend"></div>
      <div class="heat"></div>
      <div class="flash" id="flash"></div>
    </div>

    <div class="grain"></div>

    <div class="title-wrap">
      <div class="title-box"></div>
      <div class="title" data-text="Em Manutenção">Em Manutenção</div>
    </div>
  </div>

  <script>
    const page = document.getElementById("page");
    const video = document.getElementById("heroVideo");

    let sequenceRunning = false;
    let timers = [];

    function wait(ms){
      return new Promise(resolve => {
        const id = setTimeout(resolve, ms);
        timers.push(id);
      });
    }

    function clearAllTimers(){
      timers.forEach(clearTimeout);
      timers = [];
    }

    async function runEndingSequence(){
  if (sequenceRunning) return;
  sequenceRunning = true;

  video.pause();

  // 🔥 explosão + clarão AO MESMO TEMPO
  page.classList.add("is-fire");
  page.classList.add("is-flash");

  // mantém clarão por 2s
  await wait(2000);

  // tira o fogo (fica só claro)
  page.classList.remove("is-fire");

  // mostra texto
  page.classList.add("show-title");

  // texto por 2.5s
  await wait(2500);

  // limpa tudo
  page.classList.remove("show-title");
  page.classList.remove("is-flash");

  await wait(200);

  video.currentTime = 0;
  await video.play().catch(() => {});
  sequenceRunning = false;
}
    

    video.addEventListener("timeupdate", () => {
      if (!video.duration || sequenceRunning) return;
      const remaining = video.duration - video.currentTime;
      if (remaining <= 0.45) {
        runEndingSequence();
      }
    });

    video.addEventListener("ended", () => {
      if (!sequenceRunning) {
        runEndingSequence();
      }
    });

    window.addEventListener("load", async () => {
      await video.play().catch(() => {});
    });

    document.addEventListener("visibilitychange", async () => {
      if (!document.hidden && !sequenceRunning) {
        await video.play().catch(() => {});
      }
    });
  </script>
</body>
</html>
